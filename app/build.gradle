plugins {
    id 'com.android.application'
}

android {

    namespace "com.example.document"

    compileSdk 36

    defaultConfig {
        applicationId "com.example.document"
        minSdk 21
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
